# ============================================================
# MODULE: .github/workflows/release.yml
# ============================================================
name: Build and Release TensorMedia
on:
  push:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: macOS
          - os: windows-latest
            artifact_name: Windows
          - os: ubuntu-latest
            artifact_name: Linux-CPU
            type: cpu

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Base Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Install PyTorch (CPU Mode)
      if: matrix.type == 'cpu'
      run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

    - name: Install Project Dependencies
      run: pip install -r requirements.txt

    - name: Fetch ML Models
      run: python setup_models.py

    - name: Build
      run: pyinstaller --noconfirm TensorMedia.spec

    - name: Package Windows
      if: matrix.os == 'windows-latest'
      run: iscc setup.iss

    - name: Package macOS
      if: matrix.os == 'macos-latest'
      run: |
        codesign --force --deep --sign - dist/TensorMedia.app
        hdiutil create -volname "TensorMedia" -srcfolder dist/TensorMedia.app -ov -format UDZO dist/TensorMedia-macOS.dmg

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TensorMedia-${{ matrix.artifact_name }}
        path: |
          dist/TensorMedia_Setup.exe
          dist/TensorMedia-macOS.dmg