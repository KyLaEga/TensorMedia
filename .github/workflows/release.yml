name: Tensor Media Build Matrix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compile on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-22.04]

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Inject System Dependencies (Linux)
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libegl1-mesa libxrandr2 libxss1 libxcursor1 libxcomposite1 libasound2 libxi6 libxtst6

    - name: Install ML Core & Modules (Linux CPU-only)
      if: matrix.os == 'ubuntu-22.04'
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install ML Core & Modules (macOS / Windows)
      if: matrix.os != 'ubuntu-22.04'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Compile Binary (macOS / Linux)
      if: matrix.os != 'windows-latest'
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "TensorMedia" --add-data "assets:assets" --add-data "models:models" main.py

    - name: Compile Binary (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "TensorMedia" --add-data "assets;assets" --add-data "models;models" main.py

    - name: Build Windows Installer (.exe)
      if: matrix.os == 'windows-latest'
      run: |
        iscc setup.iss

    - name: Build macOS Image (.dmg)
      if: matrix.os == 'macos-latest'
      run: |
        mkdir -p dist/dmg_root
        mv dist/TensorMedia.app dist/dmg_root/
        ln -s /Applications dist/dmg_root/Applications
        hdiutil create -volname "TensorMedia" -srcfolder dist/dmg_root -ov -format UDZO dist/TensorMedia-macOS.dmg

    - name: Extract Windows Artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: TensorMedia-Windows-Installer
        path: dist/TensorMedia_Setup.exe
        retention-days: 5

    - name: Extract macOS Artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: TensorMedia-macOS-DMG
        path: dist/TensorMedia-macOS.dmg
        retention-days: 5

    - name: Extract Linux Artifact
      if: matrix.os == 'ubuntu-22.04'
      uses: actions/upload-artifact@v4
      with:
        name: TensorMedia-Linux-CPU
        path: dist/TensorMedia
        retention-days: 5