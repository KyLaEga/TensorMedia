name: Tensor Media Build Matrix

on:
  push:
    branches: [ "main" ]  # Запуск при каждой загрузке кода в main
  workflow_dispatch:      # Сохранение кнопки ручного запуска

jobs:
  build:
    name: Compile on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-22.04]

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Inject System Dependencies (Linux)
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libegl1-mesa libxrandr2 libxss1 libxcursor1 libxcomposite1 libasound2 libxi6 libxtst6

    - name: Install ML Core & Modules
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Compile Binary (macOS / Linux)
      if: matrix.os != 'windows-latest'
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "TensorMedia" --add-data "assets:assets" --add-data "models:models" main.py

    - name: Compile Binary (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "TensorMedia" --add-data "assets;assets" --add-data "models;models" main.py

    - name: Extract Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TensorMedia-${{ matrix.os }}
        path: dist/TensorMedia
        retention-days: 5