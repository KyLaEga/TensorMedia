name: Build and Release TensorMedia
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: macOS
            asset: dist/TensorMedia-macOS.dmg
          - os: windows-latest
            artifact_name: Windows
            asset: dist/TensorMedia_Setup.exe
          - os: ubuntu-22.04
            artifact_name: Linux-CPU
            asset: dist/TensorMedia-Linux-x86_64.tar.gz.part-*

    steps:
    - uses: actions/checkout@v6

    # Linux runner has ~14 GB free; the build (torch+models+dist) plus the
    # tar.gz + split parts coexisting at archive time tipped it to "No space
    # left on device" (v1.2.4). Reclaim ~12-15 GB of preinstalled SDKs we don't
    # use. Do NOT touch the hosted tool cache (it holds the setup-python runtime).
    - name: Free up disk space (Linux runner)
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
        df -h /

    - name: Enable Long Paths on Windows
      if: matrix.os == 'windows-latest'
      run: git config --system core.longpaths true
    
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12' # Исправлено: гибкая версия для предотвращения ошибки отсутствия патча
        cache: 'pip'
    
    - name: Install System Dependencies (Linux)
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 xdg-utils

    - name: Install Base Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Install PyTorch (Windows / Linux CPU Version)
      if: matrix.os == 'ubuntu-22.04' || matrix.os == 'windows-latest'
      run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

    - name: Install PyTorch (macOS MPS Version)
      if: matrix.os == 'macos-latest'
      run: pip install torch torchvision

    - name: Install Project Dependencies
      run: pip install -r requirements.txt

    - name: Cache ML Models
      id: cache-models
      uses: actions/cache@v5
      with:
        path: models
        key: ml-models-${{ hashFiles('setup_models.py') }}

    - name: Fetch ML Models into CI
      if: steps.cache-models.outputs.cache-hit != 'true'
      env:
        PYTHONIOENCODING: "utf8"
      run: python setup_models.py

    - name: Compile Binary (Cross-Platform)
      # On a tag push github.ref_name is the tag (e.g. v1.1.0); the spec strips
      # the 'v' and feeds it into the macOS info_plist. On a manual run it's a
      # branch name, which the spec rejects and falls back to the git tag.
      env:
        TENSORMEDIA_VERSION: ${{ github.ref_name }}
      run: pyinstaller --noconfirm TensorMedia.spec

    - name: Build Windows Installer (.exe)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $v = "${{ github.ref_name }}" -replace '^v', ''
        if ($v -notmatch '^\d+(\.\d+){0,3}$') { $v = '1.2.9' }
        iscc /DMyAppVersion=$v setup.iss

    - name: Build macOS Image (.dmg)
      if: matrix.os == 'macos-latest'
      run: |
        mkdir -p dist/dmg_root
        cp -R dist/TensorMedia.app dist/dmg_root/
        ln -s /Applications dist/dmg_root/Applications
        hdiutil create -volname "TensorMedia" -srcfolder dist/dmg_root -ov -format UDZO dist/TensorMedia-macOS.dmg

    - name: Build Linux Archive (.tar.gz, split into <2GiB volumes)
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        cd dist
        tar -czf TensorMedia-Linux-x86_64.tar.gz TensorMedia/
        # GitHub Releases HARD-caps a single asset at 2 GiB (2147483648 B); this
        # CPU bundle (torch+Qt+opencv+faiss, no weights) is ~2.7 GiB. Split into
        # 1900 MiB numbered volumes: TensorMedia-Linux-x86_64.tar.gz.part-00 / -01.
        # Users reassemble with `cat ...part-* > ...tar.gz` (see README).
        split -b 1900M -d TensorMedia-Linux-x86_64.tar.gz TensorMedia-Linux-x86_64.tar.gz.part-
        rm -f TensorMedia-Linux-x86_64.tar.gz
        ls -lh TensorMedia-Linux-x86_64.tar.gz.part-*

    # Каждая matrix-job выгружает ТОЛЬКО свой артефакт. Это обслуживает и ручной
    # запуск (workflow_dispatch, retention-days), и передачу артефакта в job
    # release при пуше тега — без гонки за один и тот же релиз.
    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: TensorMedia-${{ matrix.artifact_name }}
        path: ${{ matrix.asset }}
        retention-days: 5

  # Единственный job, создающий релиз: ждёт все build-job, скачивает все
  # артефакты и ОДИН раз публикует их в релиз. Это устраняет гонку, из-за
  # которой Linux-ассет терялся (v1.1.0 / v1.2.1).
  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts

    # Fault-isolated publish: create the release ONCE, then upload each asset
    # INDIVIDUALLY. A single failed/oversized file emits a ::warning:: and is
    # skipped — it can no longer abort the other assets (the v1.2.2 monolithic
    # all-or-nothing regression, where the >2GiB Linux file dropped mac+win too).
    - name: Publish release assets (fault-isolated)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
        TAG: ${{ github.ref_name }}
      run: |
        gh release create "$TAG" --title "$TAG" --notes "Automated release $TAG" \
          || echo "release $TAG already exists — reusing"
        shopt -s globstar nullglob
        for f in artifacts/**/*; do
          [ -f "$f" ] || continue
          echo "::group::upload $(basename "$f")"
          if gh release upload "$TAG" "$f" --clobber; then
            echo "OK: $f"
          else
            echo "::warning::failed to upload $f (continuing)"
          fi
          echo "::endgroup::"
        done